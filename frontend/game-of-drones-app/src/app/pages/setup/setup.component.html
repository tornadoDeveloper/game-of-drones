<div class="container">
  <div class="setup-card card">
    <h1>Enter Player Names</h1>

    <div class="form-group">
      <label>Player 1</label>
      <input type="text" [(ngModel)]="player1Name" placeholder="Player 1 name" maxlength="30" />
    </div>

    <div class="form-group">
      <label>Player 2</label>
      <input type="text" [(ngModel)]="player2Name" placeholder="Player 2 name" maxlength="30" />
    </div>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <div class="btn-row mt-3">
      <button class="btn btn-secondary" (click)="goBack()">Back</button>
      <button class="btn btn-primary" (click)="startGame()" [disabled]="loading">
        {{ loading ? 'Starting...' : 'Start' }}
      </button>
    </div>
  </div>
</div>
